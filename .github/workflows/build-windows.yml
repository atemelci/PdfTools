name: Build Windows EXE

# Builds the standalone, double-clickable Windows executable.
# - Every push / manual run produces a downloadable build artifact.
# - Pushing a tag like "v1.0.0" also publishes a GitHub Release with the .exe attached.

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build portable Windows .exe
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-Windows
          path: release/*.exe
          if-no-files-found: error

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
