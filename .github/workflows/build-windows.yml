name: Build Windows EXE

# Builds the standalone, double-clickable Windows executable.
# - Every push / manual run produces a downloadable build artifact.
# - A GitHub Release with the .exe attached is published either by pushing a
#   tag like "v1.0.0", or by running this workflow manually and filling in the
#   "release_tag" input (the release + tag are created server-side by Actions).

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish a Release with this tag (e.g. v1.0.1). Leave blank to only build the artifact."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build portable Windows .exe
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-Windows
          path: release/*.exe
          if-no-files-found: error

      - name: Publish release (on tag or manual dispatch with a tag)
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: release/*.exe
          generate_release_notes: true
