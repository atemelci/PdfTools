name: Build Linux App

# Builds the Linux desktop application:
#   - AppImage — a single, portable file. Make it executable and double-click,
#     no installation required (the Linux equivalent of the portable .exe).
#   - .deb — an installable package for Debian/Ubuntu.
#
# Every push / manual run produces downloadable build artifacts.
# Pushing a tag like "v1.0.0" also attaches the files to a GitHub Release.

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Linux AppImage + deb
        run: npm run dist:linux

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-Linux
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
          generate_release_notes: true
