name: Build Linux App

# Builds the Linux desktop application:
#   - AppImage — a single, portable file. Make it executable and double-click,
#     no installation required (the Linux equivalent of the portable .exe).
#   - .deb — an installable package for Debian/Ubuntu.
#
# Every push / manual run produces downloadable build artifacts.
# A GitHub Release with the files attached is published either by:
#   - pushing a tag like "v1.0.0", or
#   - running this workflow manually and filling in the "release_tag" input
#     (the release + tag are then created server-side by Actions).

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish a Release with this tag (e.g. v1.0.1). Leave blank to only build artifacts."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Linux AppImage + deb
        run: npm run dist:linux

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-Linux
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

      - name: Publish release (on tag or manual dispatch with a tag)
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: |
            release/*.AppImage
            release/*.deb
          generate_release_notes: true
